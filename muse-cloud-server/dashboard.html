<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muse Cloud - 数据仪表盘</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1923; color: #e0e0e0; min-height: 100vh; }
.header { background: #1a2d3d; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2d5f8a; }
.header h1 { font-size: 20px; color: #ff6d00; }
.status { font-size: 12px; padding: 4px 12px; border-radius: 12px; }
.status.ok { background: #1b5e20; color: #81c784; }
.status.err { background: #5e1b1b; color: #ef9a9a; }
.container { display: flex; height: calc(100vh - 57px); overflow: hidden; }
.sidebar { width: 320px; min-width: 280px; max-height: 100%; background: #15232e; display: flex; flex-direction: column; border-right: 1px solid #2a3f4f; }
.sidebar h3 { padding: 16px; font-size: 14px; color: #78909c; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a3f4f; flex-shrink: 0; flex-grow: 0; }
#sessionList { flex: 1 1 0; min-height: 0; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #2a3f4f #0f1923; }
#sessionList::-webkit-scrollbar { width: 6px; }
#sessionList::-webkit-scrollbar-track { background: #0f1923; }
#sessionList::-webkit-scrollbar-thumb { background: #2a3f4f; border-radius: 3px; }
.main { flex: 1; overflow-y: auto; padding: 24px; }
.session-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #1a2d3d; transition: background .15s; }
.session-item:hover { background: #1e3343; }
.session-item.active { background: #1a3a52; border-left: 3px solid #4fc3f7; }
.session-item .name { font-size: 14px; font-weight: 600; }
.session-item .meta { font-size: 11px; color: #78909c; margin-top: 4px; }
.session-item .pkts { font-size: 11px; color: #81c784; }
.card { background: #15232e; border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a3f4f; }
.card h2 { font-size: 16px; color: #4fc3f7; margin-bottom: 16px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.stat { background: #0f1923; border-radius: 6px; padding: 14px; text-align: center; }
.stat .value { font-size: 28px; font-weight: 700; color: #4fc3f7; }
.stat .label { font-size: 11px; color: #78909c; margin-top: 4px; text-transform: uppercase; }
.empty { text-align: center; padding: 60px 20px; color: #546e7a; }
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.btn { display: inline-block; padding: 8px 16px; border-radius: 4px; text-decoration: none; font-size: 13px; cursor: pointer; border: none; }
.btn-primary { background: #2d5f8a; color: #fff; }
.btn-primary:hover { background: #3a77a8; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; color: #78909c; font-weight: 500; border-bottom: 1px solid #2a3f4f; width: 120px; vertical-align: top; }
td { padding: 8px 12px; border-bottom: 1px solid #1a2d3d; }
.loading { text-align: center; padding: 40px; color: #78909c; }
.journal-text { white-space: pre-wrap; line-height: 1.7; color: #cfd8dc; font-size: 14px; background: #0f1923; padding: 16px; border-radius: 6px; max-height: 480px; overflow-y: auto; border: 1px solid #2a3f4f; }
.journal-empty { color: #546e7a; font-style: italic; padding: 8px 0; }
.journal-meta { font-size: 12px; color: #78909c; margin-bottom: 12px; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 Muse Cloud — 数据仪表盘</h1>
  <span id="health" class="status err">连接中...</span>
</div>

<div class="container">
  <div class="sidebar">
    <h3>📋 会话列表</h3>
    <div id="sessionList"><div class="loading">加载中...</div></div>
  </div>

  <div class="main" id="mainPanel">
    <div class="empty">
      <div class="icon">📊</div>
      <p>选择一个会话查看基本信息</p>
    </div>
  </div>
</div>

<script>
const API = '';

function $(id) { return document.getElementById(id); }

async function fetchJSON(url) {
  const resp = await fetch(API + url);
  if (!resp.ok) throw new Error(`${resp.status}`);
  return resp.json();
}

async function checkHealth() {
  try {
    const h = await fetchJSON('/health');
    $('health').textContent = h.db_connected ? '数据库已连接' : '文件模式';
    $('health').className = 'status ' + (h.db_connected ? 'ok' : 'err');
  } catch(e) {
    $('health').textContent = '服务器离线';
    $('health').className = 'status err';
  }
}

let sessionData = [];
let activeDetailSid = null;
let detailRefreshTimer = null;

async function loadSessions() {
  try {
    const sessions = await fetchJSON('/api/sessions?limit=500');
    sessionData = sessions;
    const list = $('sessionList');
    if (!sessions.length) {
      list.innerHTML = '<div class="empty"><p>暂无会话</p></div>';
      return;
    }
    if (activeDetailSid && !sessions.find(s => s.session_id === activeDetailSid && s.active)) {
      if (detailRefreshTimer) { clearInterval(detailRefreshTimer); detailRefreshTimer = null; }
      activeDetailSid = null;
    }

    list.innerHTML = sessions.map(s => {
      const live = s.active;
      const dur = live ? liveDuration(s.started_at) : fmtDuration(s.started_at, s.ended_at);
      const pktStr = s.total_packets > 0
        ? `<span style="color:#81c784">${s.total_packets.toLocaleString()} 包</span>`
        : '<span style="color:#546e7a">0 包</span>';
      const sizeStr = ((s.raw_file_size_bytes || 0) / 1024).toFixed(1) + ' KB';
      const badge = live
        ? '<span style="display:inline-block;width:8px;height:8px;background:#ef5350;border-radius:50%;margin-right:6px;animation:pulse 1.5s ease-in-out infinite;"></span>'
        : '';
      return `
        <div class="session-item" onclick="selectSession('${s.session_id}')" id="item-${s.session_id}">
          <div class="name">${badge}${esc(s.device_name || s.session_id)}</div>
          <div class="meta">${fmtTime(s.started_at)} · ${dur}</div>
          <div class="pkts">${pktStr} · ${sizeStr}</div>
        </div>`;
    }).join('');
  } catch(e) {
    if (e.message === '503') {
      $('sessionList').innerHTML = '<div class="empty"><p>数据库未连接<br><small>在 .env 中配置 MySQL 后重启</small></p></div>';
    } else {
      $('sessionList').innerHTML = '<div class="empty"><p>加载失败</p></div>';
    }
  }
}

function selectSession(sid) {
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('item-' + sid);
  if (item) item.classList.add('active');

  if (detailRefreshTimer) { clearInterval(detailRefreshTimer); detailRefreshTimer = null; }

  const info = sessionData.find(s => s.session_id === sid);
  activeDetailSid = (info && info.active) ? sid : null;

  loadSessionDetail(sid);

  if (activeDetailSid) {
    detailRefreshTimer = setInterval(() => loadSessionDetail(sid, true), 3000);
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadSessionDetail(sid, silent) {
  const panel = $('mainPanel');
  if (!silent) {
    panel.innerHTML = '<div class="loading">加载中...</div>';
  }

  try {
    const isActive = (activeDetailSid === sid);
    let session;
    if (isActive) {
      const [live, meta] = await Promise.all([
        fetchJSON('/api/sessions/' + sid + '/live').catch(() => ({})),
        fetchJSON('/api/sessions/' + sid).catch(() => ({})),
      ]);
      session = { ...meta, ...live };
    } else {
      session = await fetchJSON('/api/sessions/' + sid);
    }

    const liveBadge = isActive
      ? '<span style="color:#ef5350;font-size:12px;margin-left:8px;">● 进行中</span>'
      : '';
    const dur = isActive
      ? (session.duration_seconds ? fmtSeconds(session.duration_seconds) : liveDuration(session.started_at))
      : fmtDuration(session.started_at, session.ended_at);
    const pktCount = session.packet_count !== undefined ? session.packet_count : (session.total_packets || 0);
    const fileSize = session.file_size_bytes !== undefined ? session.file_size_bytes : (session.raw_file_size_bytes || 0);
    const journal = (session.journal || '').trim();
    const journalLen = journal.length;

    if (!silent) {
      panel.innerHTML = `
        <div class="card" id="detailCard">
          <h2>📋 会话详情${liveBadge}</h2>
          <div class="stats-grid" id="liveStats">
            <div class="stat"><div class="value" id="statPkts">${Number(pktCount).toLocaleString()}</div><div class="label">总包数</div></div>
            <div class="stat"><div class="value" id="statDur">${dur}</div><div class="label">时长</div></div>
            <div class="stat"><div class="value" id="statSize">${(fileSize/1024).toFixed(1)}</div><div class="label">文件 (KB)</div></div>
            <div class="stat"><div class="value" id="statPreset">${esc(session.preset || '?')}</div><div class="label">预设</div></div>
          </div>
          <table style="margin-top:16px;">
            <tr><th>会话 ID</th><td><code>${esc(session.session_id)}</code></td></tr>
            <tr><th>设备名称</th><td>${esc(session.device_name || '-')}</td></tr>
            <tr><th>设备地址</th><td>${esc(session.device_address || '-')}</td></tr>
            <tr><th>开始时间</th><td>${fmtTime(session.started_at)}</td></tr>
            <tr><th>结束时间</th><td>${isActive ? '进行中' : fmtTime(session.ended_at)}</td></tr>
            <tr><th>原始数据</th><td><a class="btn btn-primary btn-sm" href="/api/sessions/${esc(session.session_id)}/raw" download>下载 .bin</a></td></tr>
          </table>
        </div>

        <div class="card">
          <h2>📝 禅修记录</h2>
          <div class="journal-meta">${journalLen ? `共 ${journalLen} 字` : '用户尚未填写本次禅修心得'}</div>
          ${journalLen
            ? `<div class="journal-text">${esc(journal)}</div>`
            : '<div class="journal-empty">App 结束禅修后可在提交页填写操作心法、过程状态与结束时感受。</div>'}
        </div>
      `;
    } else {
      const statPkts = document.getElementById('statPkts');
      const statDur = document.getElementById('statDur');
      const statSize = document.getElementById('statSize');
      if (statPkts) statPkts.textContent = Number(pktCount).toLocaleString();
      if (statDur) statDur.textContent = isActive
        ? fmtSeconds(session.duration_seconds || 0)
        : dur;
      if (statSize) statSize.textContent = (fileSize/1024).toFixed(1);
    }

    if (!isActive && detailRefreshTimer) {
      clearInterval(detailRefreshTimer);
      detailRefreshTimer = null;
      activeDetailSid = null;
    }
  } catch(e) {
    if (!silent) {
      panel.innerHTML = '<div class="empty"><p>加载失败: ' + esc(e.message) + '</p></div>';
    }
  }
}

function fmtTime(iso) {
  if (!iso) return '-';
  return new Date(iso).toLocaleString('zh-CN');
}
function fmtDuration(start, end) {
  if (!start || !end) return '-';
  const sec = (new Date(end) - new Date(start)) / 1000;
  return fmtSeconds(sec);
}
function fmtSeconds(sec) {
  if (sec < 0) return '-';
  if (sec < 60) return Math.round(sec) + 's';
  if (sec < 3600) return Math.round(sec/60) + 'm ' + Math.round(sec%60) + 's';
  return Math.round(sec/3600) + 'h ' + Math.round((sec%3600)/60) + 'm';
}
function liveDuration(startIso) {
  if (!startIso) return '-';
  const sec = (new Date() - new Date(startIso)) / 1000;
  return fmtSeconds(sec);
}

checkHealth();
loadSessions();
setInterval(checkHealth, 30000);
setInterval(loadSessions, 15000);
</script>

</body>
</html>
